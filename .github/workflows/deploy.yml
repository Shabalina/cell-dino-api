name: Deploy to Amazon ECR

on:
  push:
    branches: [ "main" ] # Triggers only when you push to main

jobs:
  deploy:
    name: Build and Push
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        lfs: true
        fetch-depth: 2 # Required to compare the current commit with the previous one

    - name: Pull LFS files
      run: git lfs pull

    # Check if model-related files changed
    - name: Check for Model Changes
      id: model-changes
      uses: tj-actions/changed-files@v41
      with:
        files: |
         src/**
         weights/**
         Dockerfile

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, Tag, and Push Image
      if: steps.model-changes.outputs.any_changed == 'true'
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
      run: |
        # Use buildx to ensure linux/amd64 compatibility and remove OCI bloat
        docker buildx build \
          --platform linux/amd64 \
          --provenance=false \
          --output type=docker \
          ---push \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Plan
      id: plan
      working-directory: ./terraform
      run: |
        terraform init
        terraform plan \
          -var="region=${{ secrets.AWS_REGION }}" \
         -var="image_tag=latest" \
         -var="commit_sha=${{ github.sha }}" \
          -var="ecr_url=${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}" \
          -var="sagemaker_role_arn=${{ secrets.SAGEMAKER_ROLE_ARN }}"
      continue-on-error: false

    - name: Terraform Apply
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      working-directory: ./terraform
      run: |
        terraform init
        terraform apply -auto-approve \
          -var="region=${{ secrets.AWS_REGION }}" \
          -var="image_tag=latest" \
          -var="commit_sha=${{ github.sha }}" \
          -var="ecr_url=${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}" \
          -var="sagemaker_role_arn=${{ secrets.SAGEMAKER_ROLE_ARN }}"